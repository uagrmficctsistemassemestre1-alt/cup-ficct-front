services:
  frontend:
    build:
      context: .
      args:
        # Tomado de .env (docker compose lo sustituye automáticamente).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: cup-ficct-frontend
    container_name: cup-ficct-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # URL server-side para los proxys de archivos (vacía en prod = usa NEXT_PUBLIC).
      BACKEND_API_URL: ${BACKEND_API_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
